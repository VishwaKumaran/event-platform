services:
  app:
    build: .
    ports:
    - 8000:8000
    env_file:
    - .env
    depends_on:
      redis:
        condition: service_healthy
  redis:
    image: redis:latest
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 5s
      retries: 5
