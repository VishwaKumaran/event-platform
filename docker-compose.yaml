services:
    postgres:
        image: timescale/timescaledb:latest-pg14
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: events_db
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
    redis:
        image: redis:latest
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            interval: 5s
            timeout: 5s
            retries: 5
    backend:
        build: ./backend
        ports:
            - 8000:8000
        env_file:
            - ./backend/.env.docker
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
    worker:
        build: ./worker
        ports:
            - 8001:8000
        env_file:
            - ./worker/.env.docker
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
